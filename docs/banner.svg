<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#060a0f"/>
      <stop offset="50%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#060a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8770a"/>
      <stop offset="100%" stop-color="#c45c00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.12" stroke="#e8770a" stroke-width="0.5">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Border lines -->
  <rect x="1" y="1" width="898" height="198" fill="none" stroke="#e8770a" stroke-width="1.5" rx="4"/>
  <line x1="0" y1="4" x2="900" y2="4" stroke="#e8770a" stroke-width="3"/>

  <!-- Truck -->
  <g transform="translate(40, 65)">
    <!-- Trailer -->
    <rect x="0" y="10" width="110" height="50" rx="2" fill="#0d1520" stroke="#e8770a" stroke-width="1.5"/>
    <!-- Trailer dividers -->
    <line x1="30" y1="10" x2="30" y2="60" stroke="#1a2535" stroke-width="1"/>
    <line x1="60" y1="10" x2="60" y2="60" stroke="#1a2535" stroke-width="1"/>
    <line x1="90" y1="10" x2="90" y2="60" stroke="#1a2535" stroke-width="1"/>
    <!-- Cab -->
    <rect x="110" y="20" width="55" height="40" rx="3" fill="#111c2a" stroke="#e8770a" stroke-width="1.5"/>
    <!-- Cab roof -->
    <path d="M112 20 Q115 6 135 6 L165 20 Z" fill="#0d1520" stroke="#e8770a" stroke-width="1"/>
    <!-- Windshield -->
    <rect x="142" y="10" width="22" height="14" rx="1" fill="#60a5fa" opacity="0.6"/>
    <!-- Grill -->
    <rect x="163" y="28" width="5" height="18" rx="1" fill="url(#accent)" opacity="0.9"/>
    <!-- Headlights -->
    <rect x="163" y="24" width="5" height="6" rx="1" fill="#fbbf24" opacity="0.9"/>
    <!-- Exhaust -->
    <rect x="160" y="0" width="4" height="12" rx="1" fill="#4a5568"/>
    <!-- Wheels -->
    <circle cx="25"  cy="70" r="11" fill="#060a0f" stroke="#e8770a" stroke-width="2.5"/>
    <circle cx="25"  cy="70" r="5"  fill="#e8770a" opacity="0.5"/>
    <circle cx="75"  cy="70" r="11" fill="#060a0f" stroke="#e8770a" stroke-width="2.5"/>
    <circle cx="75"  cy="70" r="5"  fill="#e8770a" opacity="0.5"/>
    <circle cx="128" cy="70" r="11" fill="#060a0f" stroke="#e8770a" stroke-width="2.5"/>
    <circle cx="128" cy="70" r="5"  fill="#e8770a" opacity="0.5"/>
    <circle cx="153" cy="70" r="11" fill="#060a0f" stroke="#e8770a" stroke-width="2.5"/>
    <circle cx="153" cy="70" r="5"  fill="#e8770a" opacity="0.5"/>
    <!-- Road line -->
    <line x1="-40" y1="81" x2="240" y2="81" stroke="#1a2535" stroke-width="1" stroke-dasharray="15,10"/>
  </g>

  <!-- Title block -->
  <text x="260" y="80" font-family="monospace" font-size="36" font-weight="bold"
        fill="#e2e8f0" letter-spacing="4">SUPPLY CHAIN</text>
  <text x="260" y="120" font-family="monospace" font-size="36" font-weight="bold"
        fill="url(#accent)" letter-spacing="4">OPTIMIZER</text>
  <text x="262" y="148" font-family="monospace" font-size="11"
        fill="#4a5568" letter-spacing="3">3PL INTELLIGENCE PLATFORM  ·  PYTHON  ·  DASH  ·  XGBOOST</text>

  <!-- Right stats -->
  <g font-family="monospace">
    <text x="650" y="65"  font-size="10" fill="#4a5568" letter-spacing="2">DATASET</text>
    <text x="650" y="85"  font-size="22" font-weight="bold" fill="#e8770a">18,000+</text>
    <text x="650" y="100" font-size="10" fill="#4a5568">shipment records · 3 years</text>

    <text x="650" y="130" font-size="10" fill="#4a5568" letter-spacing="2">MODEL ACCURACY</text>
    <text x="650" y="150" font-size="22" font-weight="bold" fill="#4ade80">87.4%</text>
    <text x="650" y="165" font-size="10" fill="#4a5568">ROC-AUC · XGBoost</text>
  </g>

  <!-- Corner tag -->
  <text x="860" y="190" font-family="monospace" font-size="9" fill="#2a3545" text-anchor="end">v3.0</text>
</svg>
