services:
  - type: web
    name: supply-chain-optimizer
    env: python
    buildCommand: "pip install -r requirements.txt && python data/generate_dataset.py && python src/preprocessing.py && python src/model_training.py"
    startCommand: "gunicorn src.dashboard:server --workers 2 --bind 0.0.0.0:$PORT --timeout 120"
    envVars:
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: supply-chain-db
          property: connectionString

databases:
  - name: supply-chain-db
    plan: free
